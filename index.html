<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#00357A"/>
<meta name="description" content="Aktuelle Nachrichten aus der NRW-Landespolitik"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>NRW Politik Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --blau:#00357A;--blau2:#002255;--rot:#C8102E;
  --sand:#F6F4EF;--w:#FFFFFF;--ln:#E0DDD7;
  --g:#888580;--t:#111117;
  --fd:"Newsreader",Georgia,serif;
  --fu:"DM Sans",system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fu);background:var(--sand);color:var(--t);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button,input,select{font-family:var(--fu);cursor:pointer;border:none;background:none}

.hd{background:var(--blau);padding:.9rem 1.25rem}
.hd-in{max-width:1000px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:.75rem}
.brand{display:flex;align-items:stretch;gap:.65rem}
.bar{width:4px;background:var(--rot);border-radius:2px;flex-shrink:0}
.brand h1{font-family:var(--fd);font-size:1.4rem;font-weight:700;letter-spacing:-.02em;color:#fff;line-height:1.1}
.brand p{font-size:.68rem;color:rgba(255,255,255,.5);margin-top:.15rem}
.hd-ts{font-size:.68rem;color:rgba(255,255,255,.45);text-align:right;flex-shrink:0}
#ts{color:rgba(255,255,255,.8)}

.tb{background:var(--w);border-bottom:1px solid var(--ln);position:sticky;top:0;z-index:40}
.tb-in{max-width:1000px;margin:0 auto;padding:.55rem 1.25rem;display:flex;flex-wrap:wrap;gap:.4rem;align-items:center}
.sw{position:relative;flex:1;min-width:160px}
.sw svg{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--g);pointer-events:none;width:13px;height:13px}
#q{width:100%;padding:.44rem .7rem .44rem 1.9rem;border:1px solid var(--ln);border-radius:4px;font-size:.82rem;background:var(--sand);color:var(--t)}
#q:focus{outline:none;border-color:var(--blau);background:var(--w)}
.sel{padding:.44rem .55rem;border:1px solid var(--ln);border-radius:4px;font-size:.79rem;background:var(--sand);color:var(--t)}
.sel:focus{outline:none;border-color:var(--blau)}
.bx{padding:.42rem .7rem;font-size:.75rem;color:var(--g);border:1px dashed var(--ln);border-radius:4px;display:none}
.bx.on{display:block}
.bx:hover{color:var(--rot);border-color:var(--rot)}

.sl{max-width:1000px;margin:0 auto;padding:.6rem 1.25rem .3rem;font-size:.7rem;color:var(--g);display:flex;align-items:center;gap:.4rem}
.dot{width:6px;height:6px;border-radius:50%;background:var(--g);flex-shrink:0;transition:background .4s}

.pg{max-width:1000px;margin:0 auto;padding:.4rem 1.25rem 4rem}

/* loader */
#ldr{padding:4rem 1rem;text-align:center;color:var(--g)}
.spin{display:inline-block;width:1.6rem;height:1.6rem;border:3px solid var(--ln);border-top-color:var(--blau);border-radius:50%;animation:sp .6s linear infinite;margin-bottom:.6rem}
@keyframes sp{to{transform:rotate(360deg)}}
.ldr-detail{font-size:.72rem;color:var(--g);margin-top:.5rem;min-height:1.2em}

/* feed */
.it{display:grid;grid-template-columns:4px 1fr;gap:0 .85rem;padding:.8rem 0;border-bottom:1px solid var(--ln)}
.stripe{background:var(--ln);border-radius:2px;transition:background .12s}
.it:hover .stripe{background:var(--blau)}
.bd{min-width:0}
.mt{display:flex;flex-wrap:wrap;align-items:center;gap:.28rem;margin-bottom:.28rem}
.tg{font-size:.61rem;font-weight:600;padding:.1rem .4rem;border-radius:3px;white-space:nowrap;text-transform:uppercase;letter-spacing:.05em}
.ts-{background:#E6ECF5;color:var(--blau)}
.tr-{background:#ECFAEE;color:#1A5C2A}
.tp-{background:#FFF4E6;color:#7A4000}
.id{font-size:.65rem;color:var(--g);margin-left:auto}
.ti{font-family:var(--fd);font-size:.96rem;font-weight:700;line-height:1.36;margin-bottom:.22rem}
.ti a:hover{color:var(--blau)}
.de{font-size:.77rem;line-height:1.55;color:#555360;margin-bottom:.32rem}
.ps{display:flex;flex-wrap:wrap;gap:.22rem}
.empty{padding:3rem 1rem;text-align:center;color:var(--g);font-size:.85rem}

#more{display:none;margin:1.25rem auto 0;padding:.5rem 2rem;background:var(--blau);color:#fff;border-radius:4px;font-size:.82rem;font-weight:500}
#more.on{display:block}
#more:hover{background:var(--blau2)}

footer{text-align:center;padding:1.25rem;font-size:.68rem;color:var(--g);border-top:1px solid var(--ln)}
footer a{color:var(--blau)}

/* PWA banner */
#pwa{display:none;position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:var(--blau);color:#fff;padding:.65rem 1.1rem;border-radius:8px;font-size:.82rem;box-shadow:0 4px 20px rgba(0,0,0,.3);align-items:center;gap:.6rem;z-index:999;max-width:calc(100vw - 2rem);white-space:nowrap}
#pwa.show{display:flex}
#pwa-ok{background:var(--rot);color:#fff;border-radius:4px;padding:.32rem .8rem;font-size:.78rem;font-weight:600;cursor:pointer;flex-shrink:0}
#pwa-x{color:rgba(255,255,255,.5);font-size:1rem;cursor:pointer;padding:0 .1rem}

@media(max-width:560px){
  .brand h1{font-size:1.15rem}
  .hd-ts{display:none}
  .tb-in{flex-direction:column}
  .sel,.sw{width:100%;min-width:unset}
  .id{margin-left:0;width:100%}
}
</style>
</head>
<body>

<header class="hd">
  <div class="hd-in">
    <div class="brand">
      <div class="bar"></div>
      <div>
        <h1>NRW Politik Monitor</h1>
        <p>Landtag &middot; Ministerien &middot; Medien &middot; täglich aktualisiert</p>
      </div>
    </div>
    <div class="hd-ts">Stand: <span id="ts">–</span></div>
  </div>
</header>

<div class="tb">
  <div class="tb-in">
    <div class="sw">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="q" type="search" placeholder="Stichwort …" autocomplete="off"/>
    </div>
    <select id="fq" class="sel"><option value="">Alle Quellen</option></select>
    <select id="fr" class="sel"><option value="">Alle Ressorts</option></select>
    <select id="fp" class="sel"><option value="">Alle Minister</option></select>
    <button id="bx" class="bx" type="button">✕ Zurücksetzen</button>
  </div>
</div>

<div class="sl"><span class="dot" id="dot"></span><span id="stxt">Feeds werden geladen …</span></div>

<main class="pg">
  <div id="ldr">
    <div class="spin"></div>
    <div>Nachrichten werden geladen …</div>
    <div class="ldr-detail" id="ldr-detail"></div>
  </div>
  <div id="feed"></div>
  <button id="more" type="button"></button>
</main>

<footer>
  Open Source &middot; Quellen: Landtag NRW, alle NRW-Ministerien, WDR, RP Online, WAZ &middot;
  <a href="https://github.com/your-org/nrw-politik-monitor">GitHub</a>
</footer>

<div id="pwa">
  📱 Als App installieren
  <button id="pwa-ok">Installieren</button>
  <button id="pwa-x" aria-label="Schließen">✕</button>
</div>

<script>
// ═══ KABINETT WÜST II ════════════════════════════════
const KABINETT = [
  { person:"Hendrik Wüst",       ressort:"Staatskanzlei"                              },
  { person:"Nathanael Liminski",  ressort:"Bundes- & Europaangelegenheiten, Medien"    },
  { person:"Herbert Reul",        ressort:"Inneres"                                    },
  { person:"Marcus Optendrenk",   ressort:"Finanzen"                                   },
  { person:"Mona Neubaur",        ressort:"Wirtschaft, Klimaschutz & Energie"          },
  { person:"Oliver Krischer",     ressort:"Umwelt, Naturschutz & Verkehr"              },
  { person:"Karl-Josef Laumann",  ressort:"Arbeit, Gesundheit & Soziales"              },
  { person:"Ina Scharrenbach",    ressort:"Heimat, Bau, Kommunales & Digitalisierung"  },
  { person:"Dorothee Feller",     ressort:"Schule & Bildung"                           },
  { person:"Ina Brandes",         ressort:"Kultur & Wissenschaft"                      },
  { person:"Benjamin Limbach",    ressort:"Justiz"                                     },
  { person:"Josefine Paul",       ressort:"Kinder, Jugend, Familie & Integration"      },
  { person:"Silke Gorißen",       ressort:"Landwirtschaft & Verbraucherschutz"         },
];
const KAB_RESSORTS = KABINETT.map(k=>k.ressort);
const KAB_PERSONEN = KABINETT.map(k=>k.person);

// ═══ CORS-PROXY KETTE (Fallback-Reihenfolge) ═════════
// corsproxy.io erlaubt github.io explizit im Free-Tier
const PROXIES = [
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

// ═══ RSS-FEEDS ════════════════════════════════════════
const FEEDS = [
  // Landtag
  { url:"https://www.landtag.nrw.de/home/aktuelles/meldungen-und-berichte/rss-newsfeed/rss-feed/contentArea/meldungen-rss-feed.xml", source:"Landtag NRW", ressort:"Landtag" },
  // Staatskanzlei
  { url:"https://www.land.nrw/feeds/press/all/rss.xml", source:"Landesregierung NRW", ressort:"Staatskanzlei" },
  // Innenministerium
  { url:"https://www.im.nrw/feeds/press/all/rss.xml", source:"Innenministerium", ressort:"Inneres" },
  // Finanzministerium
  { url:"https://www.fm.nrw.de/feeds/press/all/rss.xml", source:"Finanzministerium", ressort:"Finanzen" },
  // Wirtschaft (Neubaur)
  { url:"https://www.wirtschaft.nrw/feeds/press/all/rss.xml", source:"Wirtschaftsministerium", ressort:"Wirtschaft, Klimaschutz & Energie" },
  // Umwelt & Verkehr (Krischer)
  { url:"https://www.umwelt.nrw.de/feeds/press/all/rss.xml", source:"Umweltministerium", ressort:"Umwelt, Naturschutz & Verkehr" },
  // Arbeit, Gesundheit (Laumann)
  { url:"https://www.mags.nrw/feeds/press/all/rss.xml", source:"Gesundheitsministerium", ressort:"Arbeit, Gesundheit & Soziales" },
  // Heimat, Bau (Scharrenbach)
  { url:"https://www.mhkbd.nrw/feeds/press/all/rss.xml", source:"Heimatministerium", ressort:"Heimat, Bau, Kommunales & Digitalisierung" },
  // Schulministerium (Feller)
  { url:"https://www.schulministerium.nrw.de/feeds/press/all/rss.xml", source:"Schulministerium", ressort:"Schule & Bildung" },
  // Kultur & Wissenschaft (Brandes)
  { url:"https://www.mkw.nrw/feeds/press/all/rss.xml", source:"Kulturministerium", ressort:"Kultur & Wissenschaft" },
  // Justiz (Limbach)
  { url:"https://www.justiz.nrw.de/JM/Presse/press_feeds/rss_pressemitteilungen/rss.xml", source:"Justizministerium", ressort:"Justiz" },
  // Familie (Paul)
  { url:"https://www.mkjfgfi.nrw/feeds/press/all/rss.xml", source:"Familienministerium", ressort:"Kinder, Jugend, Familie & Integration" },
  // Landwirtschaft (Gorißen)
  { url:"https://www.landwirtschaft.nrw.de/feeds/press/all/rss.xml", source:"Landwirtschaftsministerium", ressort:"Landwirtschaft & Verbraucherschutz" },
  // Medien
  { url:"https://www1.wdr.de/nachrichten/landespolitik/index.xml", source:"WDR", ressort:"Landespolitik" },
  { url:"https://www1.wdr.de/nachrichten/nrw/index.xml", source:"WDR", ressort:"NRW aktuell" },
  { url:"https://rp-online.de/nrw/politik/rss.xml", source:"RP Online", ressort:"Politik" },
  { url:"https://www.waz.de/rss/themen/landespolitik.rss", source:"WAZ", ressort:"Landespolitik" },
];

// ═══ STATE ════════════════════════════════════════════
const PS=30;
let alle=[],sicht=[],seite=1;
const $feed=document.getElementById("feed"),
      $ldr=document.getElementById("ldr"),
      $ldrD=document.getElementById("ldr-detail"),
      $more=document.getElementById("more"),
      $stxt=document.getElementById("stxt"),
      $dot=document.getElementById("dot"),
      $ts=document.getElementById("ts"),
      $q=document.getElementById("q"),
      $fq=document.getElementById("fq"),
      $fr=document.getElementById("fr"),
      $fp=document.getElementById("fp"),
      $bx=document.getElementById("bx");

// ═══ UTILS ════════════════════════════════════════════
function strip(s){
  const d=document.createElement("div");
  d.innerHTML=s||"";
  return(d.textContent||"").replace(/\s+/g," ").trim();
}
function pd(s){try{return s?new Date(s):new Date()}catch{return new Date()}}
function fmt(d){
  return d.toLocaleDateString("de-DE",{day:"numeric",month:"short",year:"numeric"})
        +", "+d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})+" Uhr";
}
function uid(u,t){
  return btoa(unescape(encodeURIComponent((u+t).slice(0,60)))).replace(/[^a-zA-Z0-9]/g,"").slice(0,12);
}
function findPersonen(text){
  const tl=text.toLowerCase();
  return KAB_PERSONEN.filter(p=>tl.includes(p.toLowerCase()));
}

// ═══ RSS-PARSER ═══════════════════════════════════════
function parseRSS(xml,m){
  let doc;
  try{doc=new DOMParser().parseFromString(xml,"application/xml")}catch{return[]}
  if(doc.querySelector("parsererror")) return[];
  return[...doc.querySelectorAll("item,entry")].map(el=>{
    const g=t=>{
      // try namespace-free first, then with colon escaped
      const n=el.querySelector(t)||el.querySelector(t.replace(":","\\:"));
      if(!n) return"";
      return n.textContent||n.getAttribute("href")||n.getAttribute("url")||"";
    };
    const title=strip(g("title"));
    const link=(g("link")||g("id")||g("guid")).trim();
    const desc=strip(g("description")||g("summary")||g("content")||g("encoded"));
    const date=pd(g("pubDate")||g("published")||g("updated")||g("date"));
    if(!title||!link) return null;
    return{id:uid(link,title),title,
      desc:desc.slice(0,280)+(desc.length>280?" …":""),
      url:link,date,source:m.source,ressort:m.ressort,
      persons:findPersonen(title+" "+desc)};
  }).filter(Boolean);
}

// ═══ FETCH MIT PROXY-FALLBACK ════════════════════════
async function fetchWithFallback(url){
  for(const mkProxy of PROXIES){
    try{
      const proxyUrl=mkProxy(url);
      const r=await fetch(proxyUrl,{signal:AbortSignal.timeout(10000)});
      if(r.ok){
        const txt=await r.text();
        // sanity: must look like XML
        if(txt.includes("<")){return txt;}
      }
    }catch(e){/* try next proxy */}
  }
  return null;
}

async function ladeFeed(f){
  const xml=await fetchWithFallback(f.url);
  if(!xml) return[];
  return parseRSS(xml,f);
}

// ═══ FILTER & RENDER ══════════════════════════════════
function filtern(){
  const q=$q.value.toLowerCase().trim(),
        src=$fq.value,res=$fr.value,per=$fp.value;
  sicht=alle.filter(a=>{
    if(q&&!a.title.toLowerCase().includes(q)&&!a.desc.toLowerCase().includes(q)) return false;
    if(src&&a.source!==src) return false;
    if(res&&a.ressort!==res) return false;
    if(per&&!a.persons.includes(per)) return false;
    return true;
  });
  seite=1;rendern();
  $bx.classList.toggle("on",!!(q||src||res||per));
}

function rendern(){
  $feed.innerHTML="";
  if(!sicht.length){
    $feed.innerHTML='<p class="empty">Keine Artikel für diese Auswahl.</p>';
    $more.classList.remove("on");$stxt.textContent="Keine Treffer";return;
  }
  const chunk=sicht.slice(0,seite*PS);
  const frag=document.createDocumentFragment();
  chunk.forEach(a=>{
    const div=document.createElement("div");div.className="it";
    const pers=a.persons.length
      ?`<div class="ps">${a.persons.map(p=>`<span class="tg tp-">👤 ${p}</span>`).join("")}</div>`:"";
    div.innerHTML=`<div class="stripe"></div><div class="bd">
      <div class="mt">
        <span class="tg ts-">${a.source}</span>
        <span class="tg tr-">${a.ressort}</span>
        <span class="id">${fmt(a.date)}</span>
      </div>
      <h2 class="ti"><a href="${a.url}" target="_blank" rel="noopener noreferrer">${a.title}</a></h2>
      ${a.desc?`<p class="de">${a.desc}</p>`:""}${pers}</div>`;
    frag.appendChild(div);
  });
  $feed.appendChild(frag);
  const rest=sicht.length-chunk.length;
  $stxt.textContent=`${sicht.length} Artikel`;
  if(rest>0){$more.textContent=`${Math.min(PS,rest)} weitere anzeigen`;$more.classList.add("on");}
  else $more.classList.remove("on");
}

function drops(){
  // Quellen (nur geladene)
  [...new Set(alle.map(a=>a.source))].sort().forEach(s=>{
    $fq.appendChild(new Option(s,s));
  });

  // Ressorts: Kabinett-Gruppe zuerst, dann weitere
  const kabSet=new Set(KAB_RESSORTS);
  const feedSet=new Set(alle.map(a=>a.ressort));
  const kabVorhanden=KAB_RESSORTS.filter(r=>feedSet.has(r));
  const andere=[...feedSet].filter(r=>!kabSet.has(r)).sort();

  if(kabVorhanden.length){
    const g=document.createElement("optgroup");g.label="Kabinetts-Ressorts";
    kabVorhanden.forEach(r=>g.appendChild(new Option(r,r)));
    $fr.appendChild(g);
  }
  if(andere.length){
    const g=document.createElement("optgroup");g.label="Weitere";
    andere.forEach(r=>g.appendChild(new Option(r,r)));
    $fr.appendChild(g);
  }

  // Minister
  const gp=document.createElement("optgroup");gp.label="Kabinett Wüst II";
  KABINETT.forEach(k=>{
    gp.appendChild(new Option(`${k.person}`,k.person));
  });
  $fp.appendChild(gp);
}

// ═══ EVENTS ═══════════════════════════════════════════
[$q,$fq,$fr,$fp].forEach(el=>el.addEventListener("input",filtern));
$bx.addEventListener("click",()=>{$q.value="";$fq.value=$fr.value=$fp.value="";filtern();});
$more.addEventListener("click",()=>{seite++;rendern();});

// ═══ PWA ══════════════════════════════════════════════
let dPrompt=null;
const $pwa=document.getElementById("pwa");
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();dPrompt=e;$pwa.classList.add("show");
});
document.getElementById("pwa-ok").addEventListener("click",async()=>{
  if(!dPrompt)return;
  dPrompt.prompt();
  const{outcome}=await dPrompt.userChoice;
  if(outcome==="accepted")$pwa.classList.remove("show");
  dPrompt=null;
});
document.getElementById("pwa-x").addEventListener("click",()=>$pwa.classList.remove("show"));

// ═══ BOOTSTRAP ════════════════════════════════════════
(async()=>{
  let loaded=0;
  // Feeds parallel laden, Fortschritt anzeigen
  const results=await Promise.allSettled(
    FEEDS.map(f=>ladeFeed(f).then(items=>{
      loaded++;
      $ldrD.textContent=`${loaded} / ${FEEDS.length} Quellen geladen …`;
      return items;
    }))
  );

  const seen=new Set();
  results.forEach(r=>{
    if(r.status!=="fulfilled")return;
    r.value.forEach(a=>{if(!seen.has(a.id)){seen.add(a.id);alle.push(a);}});
  });
  alle.sort((a,b)=>b.date-a.date);
  alle=alle.slice(0,600);
  sicht=alle;
  $ldr.style.display="none";

  if(!alle.length){
    $dot.style.background="#C8102E";
    $stxt.textContent="Keine Feeds konnten geladen werden.";
    $feed.innerHTML=`<p class="empty">
      Leider konnten keine Artikel geladen werden.<br><br>
      <strong>Lösung:</strong> Öffne die Seite direkt über deine GitHub Pages URL<br>
      (z.B. <em>dein-name.github.io/nrw-politik-monitor</em>)<br><br>
      <small>Der CORS-Proxy funktioniert nur auf github.io – nicht lokal.</small>
    </p>`;
    return;
  }

  $dot.style.background="#1A9C3A";
  $ts.textContent=new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})+" Uhr";
  drops();rendern();
})();
</script>
</body>
</html>

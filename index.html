<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NRW Politik Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,700;1,6..72,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --blau:  #00357A;
  --blau2: #002255;
  --rot:   #C8102E;
  --sand:  #F7F5F0;
  --weiss: #FFFFFF;
  --linie: #DDD9D2;
  --grau:  #868480;
  --tinte: #111117;
  --f-d:   "Newsreader", Georgia, serif;
  --f-u:   "DM Sans", system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--f-u); background: var(--sand); color: var(--tinte); -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }
button, input, select { font-family: var(--f-u); cursor: pointer; }

/* Masthead */
.masthead { background: var(--blau); color: #fff; padding: 1.1rem 1.5rem .9rem; }
.masthead-inner { max-width: 1020px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem; }
.brand { display: flex; align-items: stretch; gap: .75rem; }
.brand-bar { width: 4px; background: var(--rot); border-radius: 2px; }
.brand-text h1 { font-family: var(--f-d); font-size: 1.55rem; font-weight: 700; letter-spacing: -.02em; line-height: 1.1; }
.brand-text p { font-size: .72rem; color: rgba(255,255,255,.5); margin-top: .2rem; }
.mtime { font-size: .7rem; color: rgba(255,255,255,.4); text-align: right; }
#ts { color: rgba(255,255,255,.75); }

/* Toolbar */
.toolbar { background: var(--weiss); border-bottom: 1px solid var(--linie); position: sticky; top: 0; z-index: 30; }
.toolbar-inner { max-width: 1020px; margin: 0 auto; padding: .6rem 1.5rem; display: flex; flex-wrap: wrap; gap: .5rem; align-items: center; }
.sw { position: relative; flex: 1; min-width: 180px; }
.sw svg { position: absolute; left: .65rem; top: 50%; transform: translateY(-50%); color: var(--grau); pointer-events: none; }
#q { width: 100%; padding: .48rem .75rem .48rem 2rem; border: 1px solid var(--linie); border-radius: 4px; font-size: .82rem; background: var(--sand); color: var(--tinte); }
#q:focus { outline: none; border-color: var(--blau); background: var(--weiss); }
.sel { padding: .48rem .6rem; border: 1px solid var(--linie); border-radius: 4px; font-size: .8rem; background: var(--sand); color: var(--tinte); }
.sel:focus { outline: none; border-color: var(--blau); }
.bx { padding: .45rem .75rem; font-size: .78rem; color: var(--grau); border: 1px dashed var(--linie); border-radius: 4px; background: transparent; display: none; }
.bx.on { display: block; }
.bx:hover { color: var(--rot); border-color: var(--rot); }

/* Statusline */
.stline { max-width: 1020px; margin: 0 auto; padding: .75rem 1.5rem .4rem; font-size: .72rem; color: var(--grau); display: flex; align-items: center; gap: .5rem; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--rot); flex-shrink: 0; }

/* Page */
.page { max-width: 1020px; margin: 0 auto; padding: .5rem 1.5rem 4rem; }

/* Loader */
#ldr { padding: 5rem 2rem; text-align: center; color: var(--grau); }
.spin { display: inline-block; width: 1.8rem; height: 1.8rem; border: 3px solid var(--linie); border-top-color: var(--blau); border-radius: 50%; animation: sp .65s linear infinite; margin-bottom: .75rem; }
@keyframes sp { to { transform: rotate(360deg); } }

/* Items */
#feed { display: flex; flex-direction: column; }
.item { display: grid; grid-template-columns: 4px 1fr; gap: 0 .9rem; padding: .85rem 0; border-bottom: 1px solid var(--linie); }
.stripe { background: var(--linie); border-radius: 2px; transition: background .15s; }
.item:hover .stripe { background: var(--blau); }
.body { min-width: 0; }
.meta { display: flex; flex-wrap: wrap; align-items: center; gap: .3rem; margin-bottom: .3rem; }
.tag { font-size: .63rem; font-weight: 500; padding: .12rem .45rem; border-radius: 3px; white-space: nowrap; text-transform: uppercase; letter-spacing: .05em; }
.ts { background: #E6ECF5; color: var(--blau); }
.tr { background: #EDFAF0; color: #1A5C2A; }
.tp { background: #FFF4E6; color: #7A4000; }
.idate { font-size: .67rem; color: var(--grau); margin-left: auto; }
.ititle { font-family: var(--f-d); font-size: .98rem; font-weight: 700; line-height: 1.38; margin-bottom: .25rem; }
.ititle a:hover { color: var(--blau); }
.idesc { font-size: .78rem; line-height: 1.55; color: #55545C; margin-bottom: .35rem; }
.ipers { display: flex; flex-wrap: wrap; gap: .25rem; }
.empty { padding: 3rem 1rem; text-align: center; color: var(--grau); font-size: .88rem; }

/* Mehr */
#more { display: none; margin: 1.25rem auto 0; padding: .55rem 2rem; background: var(--blau); color: #fff; border: none; border-radius: 4px; font-size: .82rem; font-weight: 500; }
#more.on { display: block; }
#more:hover { background: var(--blau2); }

/* Footer */
footer { text-align: center; padding: 1.25rem; font-size: .7rem; color: var(--grau); border-top: 1px solid var(--linie); }
footer a { color: var(--blau); }

@media (max-width: 580px) {
  .brand-text h1 { font-size: 1.2rem; }
  .mtime { display: none; }
  .toolbar-inner { flex-direction: column; }
  .sel, .sw { width: 100%; min-width: unset; }
  .idate { margin-left: 0; width: 100%; }
}
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-inner">
    <div class="brand">
      <div class="brand-bar"></div>
      <div class="brand-text">
        <h1>NRW Politik Monitor</h1>
        <p>Nachrichten aus dem Landtag und der Landespolitik &middot; täglich aktualisiert</p>
      </div>
    </div>
    <div class="mtime">Stand: <span id="ts">–</span></div>
  </div>
</header>

<div class="toolbar">
  <div class="toolbar-inner">
    <div class="sw">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="q" type="search" placeholder="Stichwort …" autocomplete="off" />
    </div>
    <select id="fq" class="sel"><option value="">Alle Quellen</option></select>
    <select id="fr" class="sel"><option value="">Alle Ressorts</option></select>
    <select id="fp" class="sel"><option value="">Alle Personen</option></select>
    <button id="bx" class="bx" type="button">✕ Zurücksetzen</button>
  </div>
</div>

<div class="stline">
  <span class="dot" id="dot"></span>
  <span id="stxt">Feeds werden geladen …</span>
</div>

<main class="page">
  <div id="ldr"><div class="spin"></div><br>Nachrichten werden geladen …</div>
  <div id="feed"></div>
  <button id="more" type="button"></button>
</main>

<footer>
  Open Source &middot; Quellen: Landtag NRW, WDR, RP Online, WAZ &middot;
  <a href="https://github.com/your-org/nrw-politik-monitor">GitHub</a>
</footer>

<script>
const PROXY = "https://api.allorigins.win/raw?url=";
const FEEDS = [
  { url:"https://www.landtag.nrw.de/portal/WWW/GB_II/II.2/Presse-und-oeffentlichkeitsarbeit/Pressemitteilungen/pressemitteilungen_rss.jsp", source:"Landtag NRW", ressort:"Landtag" },
  { url:"https://www1.wdr.de/nachrichten/landespolitik/index.xml",  source:"WDR",       ressort:"Politik"       },
  { url:"https://www1.wdr.de/themen/aktuell/index.xml",             source:"WDR",       ressort:"Aktuell"      },
  { url:"https://rp-online.de/nrw/politik/rss.xml",                 source:"RP Online", ressort:"Politik"      },
  { url:"https://www.waz.de/rss/themen/landespolitik.rss",          source:"WAZ",       ressort:"Landespolitik"},
];
const PERSONEN = [
  "Hendrik Wüst","Thomas Kutschaty","Mona Neubaur","Oliver Krischer",
  "Herbert Reul","Ina Scharrenbach","Karl Lauterbach","Friedrich Merz",
  "Olaf Scholz","Robert Habeck","Christof Rasche","Joachim Stamp",
  "Rainer Schmeltzer","Frank Börner","Andreas Bialas","Josef Hovenjürgen",
];
const PS = 30;
let alle=[], sicht=[], seite=1;
const $feed=document.getElementById("feed"), $ldr=document.getElementById("ldr"),
      $more=document.getElementById("more"), $stxt=document.getElementById("stxt"),
      $dot=document.getElementById("dot"),   $ts=document.getElementById("ts"),
      $q=document.getElementById("q"),       $fq=document.getElementById("fq"),
      $fr=document.getElementById("fr"),     $fp=document.getElementById("fp"),
      $bx=document.getElementById("bx");

function strip(s){ const d=document.createElement("div"); d.innerHTML=s||""; return (d.textContent||"").replace(/\s+/g," ").trim(); }
function pdate(s){ try{ return s?new Date(s):new Date(); }catch{ return new Date(); } }
function fmt(d){ return d.toLocaleDateString("de-DE",{day:"numeric",month:"short"})+", "+d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})+" Uhr"; }
function uid(u,t){ return btoa(unescape(encodeURIComponent((u+t).slice(0,60)))).slice(0,10); }
function findP(t){ return PERSONEN.filter(p=>t.toLowerCase().includes(p.toLowerCase())); }

function parseRSS(xml, m){
  const doc=new DOMParser().parseFromString(xml,"application/xml");
  return [...doc.querySelectorAll("item,entry")].map(el=>{
    const g=t=>{ const n=el.querySelector(t); return n?(n.textContent||n.getAttribute("href")||""):""; };
    const title=strip(g("title")), link=(g("link")||g("id")).trim();
    const desc=strip(g("description")||g("summary")||g("content"));
    const date=pdate(g("pubDate")||g("published")||g("updated"));
    if(!title||!link) return null;
    return { id:uid(link,title), title, desc:desc.slice(0,260)+(desc.length>260?" …":""),
             url:link, date, source:m.source, ressort:m.ressort, persons:findP(title+" "+desc) };
  }).filter(Boolean);
}

async function ladeFeed(f){
  try{
    const r=await fetch(PROXY+encodeURIComponent(f.url));
    if(!r.ok) throw new Error("HTTP "+r.status);
    return parseRSS(await r.text(), f);
  }catch(e){ console.warn(f.source,e.message); return []; }
}

function filtern(){
  const q=$q.value.toLowerCase().trim(), src=$fq.value, res=$fr.value, per=$fp.value;
  sicht=alle.filter(a=>{
    if(q && !a.title.toLowerCase().includes(q) && !a.desc.toLowerCase().includes(q)) return false;
    if(src && a.source!==src) return false;
    if(res && a.ressort!==res) return false;
    if(per && !a.persons.includes(per)) return false;
    return true;
  });
  seite=1; rendern();
  $bx.classList.toggle("on",!!(q||src||res||per));
}

function rendern(){
  $feed.innerHTML="";
  if(!sicht.length){
    $feed.innerHTML='<p class="empty">Keine Artikel für diese Auswahl.</p>';
    $more.classList.remove("on"); $stxt.textContent="Keine Treffer"; return;
  }
  const chunk=sicht.slice(0, seite*PS);
  chunk.forEach(a=>{
    const div=document.createElement("div"); div.className="item";
    const pers=a.persons.length?`<div class="ipers">${a.persons.map(p=>`<span class="tag tp">👤 ${p}</span>`).join("")}</div>`:"";
    div.innerHTML=`<div class="stripe"></div><div class="body">
      <div class="meta">
        <span class="tag ts">${a.source}</span>
        <span class="tag tr">${a.ressort}</span>
        <span class="idate">${fmt(a.date)}</span>
      </div>
      <h2 class="ititle"><a href="${a.url}" target="_blank" rel="noopener">${a.title}</a></h2>
      ${a.desc?`<p class="idesc">${a.desc}</p>`:""}${pers}</div>`;
    $feed.appendChild(div);
  });
  const rest=sicht.length-chunk.length;
  $stxt.textContent=`${sicht.length} Artikel`;
  if(rest>0){ $more.textContent=`${Math.min(PS,rest)} weitere Artikel anzeigen`; $more.classList.add("on"); }
  else $more.classList.remove("on");
}

function drops(){
  [...new Set(alle.map(a=>a.source))].sort().forEach(s=>{ const o=new Option(s,s); $fq.appendChild(o); });
  [...new Set(alle.map(a=>a.ressort))].sort().forEach(r=>{ const o=new Option(r,r); $fr.appendChild(o); });
  [...new Set(alle.flatMap(a=>a.persons))].sort().forEach(p=>{ const o=new Option(p,p); $fp.appendChild(o); });
}

[$q,$fq,$fr,$fp].forEach(el=>el.addEventListener("input",filtern));
$bx.addEventListener("click",()=>{ $q.value=""; $fq.value=$fr.value=$fp.value=""; filtern(); });
$more.addEventListener("click",()=>{ seite++; rendern(); });

(async()=>{
  const res=await Promise.allSettled(FEEDS.map(ladeFeed));
  const seen=new Set();
  res.forEach(r=>{ if(r.status!=="fulfilled") return; r.value.forEach(a=>{ if(!seen.has(a.id)){ seen.add(a.id); alle.push(a); } }); });
  alle.sort((a,b)=>b.date-a.date); alle=alle.slice(0,500); sicht=alle;
  $ldr.style.display="none";
  if(!alle.length){
    $dot.style.background="#C8102E";
    $stxt.textContent="Keine Feeds erreichbar – AdBlocker prüfen oder lokal testen.";
    $feed.innerHTML='<p class="empty">Feeds konnten nicht geladen werden.<br><small>Tipp: AdBlocker deaktivieren oder direkt auf GitHub Pages testen.</small></p>';
    return;
  }
  $dot.style.background="#1A8C3A";
  $ts.textContent=new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})+" Uhr";
  drops(); rendern();
})();
</script>
</body>
</html>
